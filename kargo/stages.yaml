---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: minikube
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: hello-nix-uv-py
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/voidlily/hello-nix-uv-py
        - name: image
          value: ghcr.io/voidlily/hello-nix-uv-py
        - name: stage
          value: minikube
      steps:
        - task:
            name: pre-update-image
        - uses: kustomize-set-image
          as: update-image
          config:
            path: src/k8s/base/
            images:
              - image: ${{ vars.image }}
                digest: ${{ imageFrom(vars.image).Digest }}
        - task:
            name: post-update-image
          vars:
            - name: commitMessage
              value: ${{ outputs['update-image'].commitMessage }}
